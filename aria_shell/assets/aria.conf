#
#
# Full syntax documentation:
#   https://docs.python.org/3/library/configparser.html
#

[general]
modules = Clock Audio Perf WorkSpaces Tray ThemeSelector Custom
# style = waybar          # name of a theme/stylesheet to load
# style = manjaro         # name of a theme/stylesheet to load
reload_config = yes       # restart the shell when the config file change
reload_style = yes        # reload the css files when they change


[autostart]
# here you can add programs to be run on startup, one command per line
nm-applet


[launcher]
icon_size = 48            # size in px for the icons in the results list
opacity = 100             # 0 = fully transparent, 100 = fully opaque
width = 400               # launcher width, in px
height = 400              # launcher height, in px
grab_display = yes        # avoid interact with other window if launcher is visible


[terminal]
opacity = 80              # 0 = fully transparent, 100 = fully opaque
cols = 120                # launcher width, number of characters
rows = 30                 # launcher height, number of rows
#shell = zsh              # use a custom shell instead of the default ($SHELL)
font = JetBrainsMono NF,HackNerdFont,SourceCodePro,DroidSansMono,terminus 11
hide_on_esc = yes         # hide the terminal pressing the Escape key
mouse_autohide = yes      # hide the mouse cursor while typing
grab_display = yes        # avoid interact with other window if terminal is visible


[notifications]
enabled = yes             # set to 'no' if you prefer to use an external notification server (fe: mako)
duration = 20             # seconds to wait before closing a notification. Set to 0 disable autoclose. Only integer!
position = top-right      # top-left, top-right, top-center. Or bottom-left, ...
opacity = 100             # 0 = fully transparent, 100 = fully opaque


[exiter]
columns = 3               # number of columns for button layout (max buttons per line)
ask_confirm = yes         # ask confirm for dangerous actions (logout, reboot, shutdown)
confirm_timeout = 30      # auto-confirm after X seconds (0 to disable auto-confirm)
grab_display = yes        # block interaction with other window when visible
opacity = 100             # 0 = fully transparent, 100 = fully opaque
# buttons:  (! = ask confirm before exec)
lock = aria lock
suspend = systemctl sleep
hibernate = systemctl hibernate
logout = !swaymsg exit     # TODO 'auto' ??
reboot = !systemctl reboot
shutdown = !systemctl poweroff
# You can define as many buttons as you like, fe:
# Firefox = firefox
# Firefox-icon = firefox


[locker]
password_prompt = yes     # request the user password to unlock the screen
show_avatar = yes         # show the user avatar in lock screen (taken from ~/.face and other places)
show_username = yes       # show the user name below the avatar
show_time = yes           # show the current time
show_date = yes           # show the current date
time_format = %H:%M       # format for the time
date_format = %A %d %B    # format for the date


[idler]
# NOTE: This is an experimental idler daemon, please give it a try and report back
#       your experience. I need feedbacks to understand the user needs.
# The syntax is:
#   <timeout> = command to execute after X minutes
#   <timeout>-resume = command to execute on resume
# timeout can be like: 5m, 300s, 1h (minutes by default)

# Example:
# 5 = aria lock
# 5-resume = notify-send 'Resumed'
# 600s = systemctl sleep
# 600s-resume = notify-send 'Resumed'


# Map windows classes with .desktop names, for bogus apps that sets
# unusual names on windows
[apps_class_map]
jetbrains-pycharm-ce = pycharm


[panel:Top Panel]
outputs = all             # 'all' or the name of one ore more output, es: eDP-1 HDMI-A-1, DVI-I-1
position = top            # top, bottom
layer = bottom            # bottom, top, overlay
size = fill               # fill, min  TODO: px?
align = center            # center, left, right
margin = 3                # space between the panel and the windows, in px
opacity = 100             # 0 = fully transparent, 100 = fully opaque
ontheleft = Custom:search WorkSpaces
inthecenter = Perf
ontheright = Audio Tray ThemeSelector Clock Custom:logout

# [panel:Bottom Panel]
# outputs = HDMI-A-1
# margin = 3
# layer = bottom
# position = bottom
# size = fill
# align = center  # TODO
# ontheleft = Clock
# inthecenter = Perf
# ontheright = Custom:search


[Clock]
# see: https://docs.python.org/3/library/datetime.html#format-codes
format = %e %b %Y  %H:%M
tooltip_format = %A %d %B %Y


[Clock:2]
format = %H:%M:%S


[Perf]
format =  {cpu:2.0f}%   {mem:2.0f}%
interval = 2                  # seconds between each system info fetch (min 1 second)


[WorkSpaces]
show_name = yes               # show the workspace name
show_windows = yes            # show the windows icons in each workspace
all_monitors = no             # show workspaces from all monitors
focus_window_on_click = yes   # focus the clicked window when click on workspace


[Audio]
mixer_command = pwvucontrol   # if provided show a button to run a real mixer


[Custom:search]
# label = Aria                # text to show on the gadgets
icon = open-menu              # icon name (must be available in the icon theme)
command = aria launcher       # program to run on gadget click (support aria commands)

[Custom:logout]
icon = system-shutdown-symbolic
command = aria exiter


[ThemeSelector]
# icon_name = user-home             # use a custom icon for the gadget
light_theme = Matcha-light-aliz     # preferred light theme
dark_theme = Nordic-bluish-accent   # preferred dark theme
favorites = Default Matcha-pueril   # list of other preferred themes
show_user_themes = yes              # show themes from ~/.themes
show_system_themes = no             # show themes from /usr/share/themes
show_icon_themes = yes              # also show the list of icon themes
# light_icon_theme = Papirus        # force the given icon theme (or 'ignore' to not change icon theme at all)
# dark_icon_theme = Papirus-Dark    # force the given icon theme (or 'ignore' to not change icon theme at all)
